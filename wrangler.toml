name = "maxtour"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_APP_NAME = "MaxTour"
NEXT_PUBLIC_APP_URL = "https://maxtour-app.pages.dev"
# Secrets must be set via `wrangler secret put <NAME>` or the Cloudflare dashboard:
# NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
# ADMIN_BOT_TOKEN, ADMIN_CHAT_ID, ADMIN_CHAT_ID_2, ADMIN_PASSWORD

name = "maxtour"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Production routes (use existing DNS records in Cloudflare zone)
[[routes]]
pattern = "mxtr.uz/*"
zone_name = "mxtr.uz"

[[routes]]
pattern = "www.mxtr.uz/*"
zone_name = "mxtr.uz"

[[routes]]
pattern = "remote.mxtr.uz/*"
zone_name = "mxtr.uz"

[[routes]]
pattern = "agency.mxtr.uz/*"
zone_name = "mxtr.uz"

